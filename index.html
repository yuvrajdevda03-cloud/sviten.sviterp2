<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Transportation Receipt</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f2f2;
}

.container{
    width:500px;
    margin:50px auto;
    background:#fff;
    padding:20px;
    border:1px solid #ccc;
}

.card{
    border:2px solid #ccc;
    border-radius:8px;
    padding:20px;
    text-align:center;
}

.title{
    font-weight:bold;
    font-size:18px;
    margin-bottom:10px;
}

.photo{
    width:90px;
    height:90px;
    object-fit:cover;
    border-radius:4px;
    margin-bottom:10px;
}

.validity{
    color:#4CAF50;
    font-weight:bold;
    margin-bottom:10px;
}

.info{
    font-size:16px;
    margin:5px 0;
}

.label{
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="title">
            RECEIPT FOR THE PAYMENT OF TRANSPORTATION
        </div>

        <img src="heer.jpeg" class="photo">

        <div class="validity">
            Validity Period : (1/1/2026 To 6/30/2026)
        </div>

        <div class="info"><span class="label">Academic Year :</span> 2025-2026</div>
        <div class="info"><span class="label">Application Id :</span> .........</div>
        <div class="info"><span class="label">Class :</span> THIRD YEAR</div>
        <div class="info"><span class="label">Branch :</span> .........</div>
        <div class="info"><span class="label">Route No. :</span> 17</div>
        <div class="info"><span class="label">Stop Name :</span> .......</div>
        <div class="info"><span class="label">Total Amount Paid :</span> 12500</div>

    </div>

</div>

</body>
</html>
